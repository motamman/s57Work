name: Build ENC Charts

on:
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      builds:
        description: 'Comma-separated build names (leave empty to use active list from enc-sources.yaml)'
        required: false
        default: ''

  # Monthly rebuild on the 1st at 2am UTC (sailing season: Apr-Nov)
  schedule:
    - cron: '0 2 1 4-11 *'

jobs:
  # ── Step 1: Read the config and produce a build matrix ──────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse enc-sources.yaml
        id: parse
        shell: python3 {0}
        run: |
          import json, os, yaml

          with open("enc-sources.yaml") as f:
              config = yaml.safe_load(f)

          # Use workflow_dispatch input if provided, otherwise use active list
          override = "${{ github.event.inputs.builds }}".strip()
          if override:
              active = [b.strip() for b in override.split(",")]
          else:
              active = config.get("active", [])

          base_url = config["base_url"]
          builds = config["builds"]
          matrix = []

          for name in active:
              if name not in builds:
                  print(f"WARNING: build '{name}' not found in enc-sources.yaml, skipping")
                  continue
              b = builds[name]
              # Output name derived from first source: 01CGD_ENCs.zip -> 01CGD_ENCs.mbtiles
              first_source = b["sources"][0]
              output = first_source.rsplit(".", 1)[0] + ".mbtiles"
              matrix.append({
                  "name": name,
                  "output": output,
                  "mode": b.get("mode", "by-band"),
                  "sources": [f"{base_url}/{s}" for s in b["sources"]],
                  "source_filenames": b["sources"],
              })

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")

          print(f"Active builds: {[m['name'] for m in matrix]}")

  # ── Step 2: Build each active config ────────────────────────────────
  build:
    needs: prepare
    if: needs.prepare.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install tippecanoe
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libsqlite3-dev zlib1g-dev
          git clone https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          cd /tmp/tippecanoe && make -j$(nproc) && sudo make install

      - name: Install GDAL
        run: |
          sudo apt-get install -y -qq gdal-bin

      - name: Verify tools
        run: |
          tippecanoe --version
          tile-join --version
          ogr2ogr --version

      - name: Download ENC sources
        run: |
          mkdir -p downloads
          for url in ${{ join(matrix.build.sources, ' ') }}; do
            filename=$(basename "$url")
            echo "Downloading $filename..."
            curl -fSL --retry 3 --retry-delay 5 -o "downloads/$filename" "$url"
            ls -lh "downloads/$filename"
          done

      - name: Run s57-to-mbtiles.py
        run: |
          chmod +x s57-to-mbtiles.py
          inputs=""
          for f in ${{ join(matrix.build.source_filenames, ' ') }}; do
            inputs="$inputs downloads/$f"
          done
          python3 s57-to-mbtiles.py $inputs \
            --by-band \
            -o "${{ matrix.build.output }}" \
            -j 2

      - name: Show result
        run: |
          ls -lh "data/tiles/${{ matrix.build.output }}"

      - name: Generate metadata
        shell: python3 {0}
        run: |
          import json, sqlite3, os

          mbtiles = "data/tiles/${{ matrix.build.output }}"
          name = os.path.splitext("${{ matrix.build.output }}")[0]

          db = sqlite3.connect(mbtiles)
          meta = dict(db.execute("SELECT name, value FROM metadata").fetchall())
          db.close()

          bounds = [float(x) for x in meta.get("bounds", "").split(",")]
          center = [float(x) for x in meta.get("center", "").split(",")]

          # Extract layer names from tippecanoe's json metadata
          layers = []
          if "json" in meta:
              tile_json = json.loads(meta["json"])
              layers = [l["id"] for l in tile_json.get("vector_layers", [])]

          sources = "${{ join(matrix.build.source_filenames, ',') }}".split(",")

          metadata = {
              "name": name,
              "description": "${{ matrix.build.name }}",
              "bounds": bounds,
              "center": center[:2] if len(center) >= 2 else None,
              "minzoom": int(meta.get("minzoom", 0)),
              "maxzoom": int(meta.get("maxzoom", 0)),
              "format": "pbf",
              "layers": layers,
              "enc_sources": [f"https://charts.noaa.gov/ENCs/{s}" for s in sources],
              "build_date": "${{ github.event.repository.updated_at || '' }}",
              "file_size_mb": round(os.path.getsize(mbtiles) / 1048576, 1),
          }

          out = f"data/tiles/{name}.json"
          with open(out, "w") as f:
              json.dump(metadata, f, indent=2)

          print(json.dumps(metadata, indent=2))

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.name }}
          path: |
            data/tiles/${{ matrix.build.output }}
            data/tiles/*.json
          retention-days: 7

  # ── Step 3: Create release, archive previous, prune old ─────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Archive previous release, create new one, prune old
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          DATE=$(date +%Y%m%d-%H%M%S)

          # ── Archive the current "latest" release ──
          latest_tag=$(gh release list --limit 1 --json tagName,name \
            --jq '.[] | select(.name == "ENC Charts") | .tagName' 2>/dev/null || true)
          if [ -n "$latest_tag" ]; then
            echo "Archiving previous release: $latest_tag"
            gh release edit "$latest_tag" \
              --title "ENC Charts ($latest_tag)" \
              --prerelease
          fi

          # ── Create the new release (always the same tag: "latest") ──
          # Delete the tag if it exists so we can reuse it
          gh release delete "latest" --yes --cleanup-tag 2>/dev/null || true

          files=$(find artifacts/ \( -name "*.mbtiles" -o -name "*.json" \) -type f)
          echo "Creating release with files:"
          ls -lh $files

          gh release create "latest" \
            --title "ENC Charts" \
            --notes "Automated ENC chart build from NOAA S-57 data. Built $DATE." \
            --latest \
            $files

          # ── Prune old archives (keep only 2 previous) ──
          archived=$(gh release list --limit 100 --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease)] | reverse | .[].tagName')

          count=0
          for old_tag in $archived; do
            count=$((count + 1))
            if [ $count -gt 2 ]; then
              echo "Deleting old archive: $old_tag"
              gh release delete "$old_tag" --yes --cleanup-tag
            fi
          done

          echo "Done. Current + 2 archived releases retained."
