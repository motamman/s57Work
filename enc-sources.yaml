# enc-sources.yaml — ENC chart build definitions for GitHub Actions
#
# All ZIPs are downloaded from: {base_url}/{filename}
# Edit "active" to control which builds run.

base_url: https://charts.noaa.gov/ENCs

# ─── Coast Guard District builds (multi-state regions) ───────────────

builds:

  # District 1: New England (ME, NH, MA, RI, CT, eastern NY)
  01cgd:
    output: 01cgd-new-england.mbtiles
    mode: by-band
    sources:
      - 01CGD_ENCs.zip

  # District 5: Mid-Atlantic (NJ, PA, DE, MD, VA, DC, NC)
  05cgd:
    output: 05cgd-mid-atlantic.mbtiles
    mode: by-band
    sources:
      - 05CGD_ENCs.zip

  # District 7: Southeast (SC, GA, FL east coast, PR, USVI)
  07cgd:
    output: 07cgd-southeast.mbtiles
    mode: by-band
    sources:
      - 07CGD_ENCs.zip

  # District 8: Gulf Coast (FL west coast, AL, MS, LA, TX)
  08cgd:
    output: 08cgd-gulf.mbtiles
    mode: by-band
    sources:
      - 08CGD_ENCs.zip

  # District 9: Great Lakes (OH, MI, IN, IL, WI, MN, western NY, northern PA)
  09cgd:
    output: 09cgd-great-lakes.mbtiles
    mode: by-band
    sources:
      - 09CGD_ENCs.zip

  # District 11: Southern California
